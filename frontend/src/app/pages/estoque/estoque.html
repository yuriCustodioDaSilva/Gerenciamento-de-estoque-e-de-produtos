<mat-toolbar color="primary">
  <button mat-icon-button (click)="voltar()"><mat-icon>arrow_back</mat-icon></button>
  <span>Estoque</span>
</mat-toolbar>

<div class="container">
  <mat-tab-group>

    <mat-tab label="Movimentação">
      <div class="tab-content">
        <mat-card>
          <mat-card-header>
            <mat-card-title>Nova Movimentação</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Produto</mat-label>
              <mat-select [(ngModel)]="form.produtoId">
                <mat-option *ngFor="let p of produtos" [value]="p.id">{{ p.nome }}</mat-option>
              </mat-select>
            </mat-form-field>
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Quantidade</mat-label>
              <input matInput type="number" [(ngModel)]="form.quantidade">
            </mat-form-field>
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Observação</mat-label>
              <input matInput [(ngModel)]="form.observacao">
            </mat-form-field>
          </mat-card-content>
          <mat-card-actions>
            <button mat-raised-button color="primary" (click)="executar('entrada')">Entrada</button>
            <button mat-raised-button color="warn" (click)="executar('saida')">Saída</button>
            <button mat-raised-button color="accent" (click)="executar('reserva')">Reservar</button>
            <button mat-stroked-button (click)="executar('cancelar')">Cancelar Reserva</button>
            <button mat-stroked-button color="warn" *ngIf="role === 'Administrador'" (click)="executar('ajuste')">Ajuste Manual</button>
          </mat-card-actions>
        </mat-card>
      </div>
    </mat-tab>

    <mat-tab label="Histórico">
      <div class="tab-content">
        <p *ngIf="historico.length === 0" style="padding: 16px; color: #666;">Nenhuma movimentação registrada.</p>
        <table mat-table [dataSource]="historico" class="full-width" *ngIf="historico.length > 0">
          <ng-container matColumnDef="produto">
            <th mat-header-cell *matHeaderCellDef>Produto</th>
            <td mat-cell *matCellDef="let h">{{ h.produto?.nome }}</td>
          </ng-container>
          <ng-container matColumnDef="tipo">
            <th mat-header-cell *matHeaderCellDef>Tipo</th>
            <td mat-cell *matCellDef="let h">{{ h.tipo }}</td>
          </ng-container>
          <ng-container matColumnDef="quantidade">
            <th mat-header-cell *matHeaderCellDef>Quantidade</th>
            <td mat-cell *matCellDef="let h">{{ h.quantidade }}</td>
          </ng-container>
          <ng-container matColumnDef="usuario">
            <th mat-header-cell *matHeaderCellDef>Usuário</th>
            <td mat-cell *matCellDef="let h">{{ h.usuarioResponsavel }}</td>
          </ng-container>
          <ng-container matColumnDef="data">
            <th mat-header-cell *matHeaderCellDef>Data</th>
            <td mat-cell *matCellDef="let h">{{ h.realizadoEm | date:'dd/MM/yyyy HH:mm' }}</td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="historicoColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: historicoColumns;"></tr>
        </table>
      </div>
    </mat-tab>

  </mat-tab-group>
</div>
